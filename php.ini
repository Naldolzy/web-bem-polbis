; PHP Configuration untuk Vercel Runtime
; File ini dibaca oleh vercel-php runtime saat menjalankan Laravel

; === DATABASE EXTENSIONS ===
extension = pdo_pgsql
extension = pgsql

; === LARAVEL REQUIRED EXTENSIONS ===
extension = mbstring
extension = xml
extension = ctype
extension = fileinfo
extension = bcmath
extension = curl
extension = zip
extension = openssl

; === PERFORMANCE ===
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 0

; === UPLOAD (note: files wont persist in serverless) ===
upload_max_filesize = 10M
post_max_size = 10M
memory_limit = 256M
max_execution_time = 30
